<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soroban Labs Embed Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Libre Franklin', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --bg: #f5f5f4;
      --surface: #ffffff;
      --border: #e7e5e4;
      --border-focus: #292524;
      --text: #1c1917;
      --text-secondary: #78716c;
      --text-muted: #a8a29e;
      --accent: #1c1917;
      --accent-hover: #292524;
      --code-bg: #1c1917;
      --code-text: #d6d3d1;
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
    }
    .header-inner {
      max-width: 880px;
      margin: 0 auto;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .header p {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 28px 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 1px var(--border-focus);
    }
    input::placeholder { color: var(--text-muted); font-weight: 300; }
    input.mono { font-family: var(--mono); font-size: 12px; }

    .actions { display: flex; align-items: center; gap: 14px; }

    button {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 9px 20px;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-ghost {
      background: none;
      color: var(--text-muted);
      padding: 6px 10px;
      font-weight: 400;
    }
    .btn-ghost:hover { color: var(--text); }

    .hint { font-size: 12px; font-weight: 300; color: var(--text-muted); }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .code-header .section-label { margin-bottom: 0; }

    pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 18px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.65;
      overflow-x: auto;
      white-space: pre;
    }

    #preview-section { display: none; }
    #preview-section .section-label { margin-bottom: 14px; }

    .preview-frame {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: 600px;
      background: var(--surface);
    }
    .preview-frame iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 600px) {
      .fields { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
      .container { padding: 20px 20px 40px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>Soroban Labs Embed</h1>
      <p>Test and preview embeddable simulations</p>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="section-label">Configuration</div>
      <div class="fields">
        <div>
          <label for="api-key">API Key</label>
          <input type="text" id="api-key" class="mono" placeholder="your_api_key">
        </div>
        <div>
          <label for="question">Initial Question</label>
          <input type="text" id="question" placeholder="explain projectile motion">
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="launch-btn" onclick="launch()" disabled>Launch Preview</button>
        <span class="hint" id="hint-text">Enter an API key to get started</span>
      </div>
    </div>

    <div class="card">
      <div class="code-header">
        <div class="section-label">Embed Code</div>
        <button class="btn-ghost" onclick="copyCode()">Copy</button>
      </div>
      <pre id="embed-code"></pre>
    </div>

    <div id="preview-section">
      <div class="section-label">Live Preview</div>
      <div class="preview-frame">
        <iframe id="preview-iframe"></iframe>
      </div>
    </div>
  </div>

  <script>
    const EMBED_BASE = 'https://graph.sorobanlabs.io';
    const apiKeyInput = document.getElementById('api-key');
    const questionInput = document.getElementById('question');
    const launchBtn = document.getElementById('launch-btn');
    const hintText = document.getElementById('hint-text');
    const embedCodeEl = document.getElementById('embed-code');
    const previewSection = document.getElementById('preview-section');
    const previewIframe = document.getElementById('preview-iframe');

    function generateEmbedSrc() {
      const params = new URLSearchParams();
      if (apiKeyInput.value) params.set('key', apiKeyInput.value);
      if (questionInput.value) params.set('q', questionInput.value);
      return EMBED_BASE + '/embed?' + params.toString();
    }

    function updateEmbedCode() {
      const src = generateEmbedSrc();
      embedCodeEl.textContent = '<iframe\n  src="' + src + '"\n  width="100%"\n  height="600"\n  style="border: none; border-radius: 8px;"\n  allow="clipboard-write"\n/>';

      launchBtn.disabled = !apiKeyInput.value;
      hintText.style.display = apiKeyInput.value ? 'none' : 'inline';
    }

    function launch() {
      const params = new URLSearchParams();
      params.set('url', EMBED_BASE);
      if (apiKeyInput.value) params.set('key', apiKeyInput.value);
      if (questionInput.value) params.set('q', questionInput.value);
      previewIframe.src = 'embed.html?' + params.toString();
      previewSection.style.display = 'block';
    }

    function copyCode() {
      navigator.clipboard.writeText(embedCodeEl.textContent).then(() => {
        const btn = document.querySelector('.btn-ghost');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    apiKeyInput.addEventListener('input', updateEmbedCode);
    questionInput.addEventListener('input', updateEmbedCode);
    updateEmbedCode();
  </script>
</body>
</html>
